<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grove File Link</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:#f5f5f7; color:#1d1d1f; display:flex; min-height:100vh; margin:0; align-items:center; justify-content:center; }
    .card { background:#fff; padding:40px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.08); max-width:420px; text-align:center; }
    h1 { font-size:20px; margin:0 0 8px; }
    p { color:#6e6e73; font-size:15px; line-height:1.5; margin:0; }
    .btn { display:inline-block; margin-top:20px; background:#0061fe; color:#fff; text-decoration:none; padding:12px 24px; border-radius:10px; font-weight:600; }
    .id { font-family: ui-monospace, monospace; font-size:13px; color:#86868b; margin-top:16px; word-break:break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Grove File Link</h1>
    <p id="msg">Preparing to open your file…</p>
    <a id="openBtn" class="btn" href="#">Open the file</a>
    <div class="id" id="idText"></div>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    var msg = document.getElementById('msg');
    var openBtn = document.getElementById('openBtn');
    var idText = document.getElementById('idText');
    if (id) {
      openBtn.href = 'grovefile://open?id=' + encodeURIComponent(id);
      idText.textContent = 'File reference: ' + id;
      msg.textContent = 'Click the button to open this file on your computer.';
    } else {
      msg.textContent = 'This link is missing a file reference.';
      openBtn.style.display = 'none';
    }
  </script>
</body>
</html>
